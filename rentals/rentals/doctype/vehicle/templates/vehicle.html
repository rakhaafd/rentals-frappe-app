{% extends "templates/web.html" %}

{% block page_content %}
<h1>{{ title |e }}</h1>
<h2>Color: {{ color |e }}</h2>

{% if vehicle_image %}
<img src="{{ vehicle_image |e }}" alt="">
{%else%}
<p>No image available</p>
{% endif %}

<a class="btn btn-info" href="/order-a-ride/new?vehicle={{ name |e }}">Order a Ride</a>
{% endblock %}

<!-- this is a sample default web page template -->
